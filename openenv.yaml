spec_version: 1
name: fraud_detect_env
version: 1.0.0
description: "A multi-turn fraud detection RL environment where an AI agent investigates synthetic app behavior logs across 3 difficulty tiers, gathering evidence before issuing a verdict. Features asymmetric rewards and hybrid programmatic grading."
type: space
runtime: fastapi
app: server.app:app
port: 7860

tags:
  - openenv
  - fraud-detection
  - security
  - multi-turn
  - real-world

tasks:
  - id: flag-obvious
    description: "Easy — obvious fraud with multiple IPs, geo anomalies, admin access. Max 3 steps."
    grader: server.tasks.compute_step_reward

  - id: explain-subtle
    description: "Medium — subtle patterns requiring investigation of 3+ signals. Max 5 steps."
    grader: server.tasks.compute_step_reward

  - id: adversarial-hunt
    description: "Hard — adversarially crafted logs mimicking legitimate behavior. Max 8 steps."
    grader: server.tasks.compute_step_reward
